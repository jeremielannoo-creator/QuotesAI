name: QuotesAI — Publication quotidienne

on:
  schedule:
    # Toutes les heures sont en UTC (Paris été = UTC+2, hiver = UTC+1)
    # Lundi 07h30 Paris (été) → 05h30 UTC
    - cron: '30 5 * * 1'
    # Lundi 18h15 Paris (été) → 16h15 UTC
    - cron: '15 16 * * 1'
    # Mardi, Mercredi, Jeudi 12h10 Paris (été) → 10h10 UTC
    - cron: '10 10 * * 2'
    - cron: '10 10 * * 3'
    - cron: '10 10 * * 4'
    # Mardi, Mercredi, Jeudi 19h45 Paris (été) → 17h45 UTC — Décompression
    - cron: '45 17 * * 2'
    - cron: '45 17 * * 3'
    - cron: '45 17 * * 4'
    # Vendredi 17h00 Paris (été) → 15h00 UTC
    - cron: '0 15 * * 5'
    # Samedi 10h00 Paris (été) → 08h00 UTC
    - cron: '0 8 * * 6'
    # Samedi 18h00 Paris (été) → 16h00 UTC — Profite de la vie
    - cron: '0 16 * * 6'
    # Dimanche 21h00 Paris (été) → 19h00 UTC
    - cron: '0 19 * * 0'
  workflow_dispatch:   # Déclenchement manuel depuis l'onglet Actions

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Nécessaire pour committer la DB mise à jour

    steps:
      # ── 1. Récupérer le code ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── 3. FFmpeg ─────────────────────────────────────────────────────────
      - name: FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      # ── 4. Dépendances Python ─────────────────────────────────────────────
      - name: Dépendances
        run: pip install -r requirements.txt

      # ── 5. Polices (téléchargées si absentes du repo) ─────────────────────
      - name: Polices
        run: python setup_fonts.py

      # ── 6. Base de données (import initial si absente) ────────────────────
      - name: Initialiser la DB si absente
        run: |
          if [ ! -f db/quotes.db ]; then
            echo "DB absente — import depuis quotes.csv"
            python import_quotes.py
          fi

      # ── 7. Pipeline principal ─────────────────────────────────────────────
      - name: Lancer le pipeline
        env:
          PEXELS_API_KEY:          ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:         ${{ secrets.PIXABAY_API_KEY }}
          CLOUDINARY_CLOUD_NAME:   ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:      ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:   ${{ secrets.CLOUDINARY_API_SECRET }}
          INSTAGRAM_ACCESS_TOKEN:  ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:       ${{ secrets.INSTAGRAM_USER_ID }}
          MAKE_TIKTOK_WEBHOOK_URL: ${{ secrets.MAKE_TIKTOK_WEBHOOK_URL }}
          DRIVE_GAS_URL:           ${{ secrets.DRIVE_GAS_URL }}
        run: python pipeline.py --platform both

      # ── 8. Sauvegarder la DB (citation marquée comme publiée) ─────────────
      - name: Commit DB mise à jour
        run: |
          git config user.email "quotesai-bot@github.com"
          git config user.name  "QuotesAI Bot"
          git add db/quotes.db
          git diff --staged --quiet || git commit -m "chore: citation publiée [skip ci]"
          git push
